<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <script>
        let particles = [];
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for(let i = 0; i < 100; i++) particles.push(new Particle());
        }
        function draw() {
            background(20, 20, 30);
            particles.forEach(p => { p.update(); p.show(); });
        }
        class Particle {
            constructor() { this.pos = createVector(random(width), random(height)); this.vel = p5.Vector.random2D(); }
            update() {
                this.pos.add(this.vel);
                if(dist(this.pos.x, this.pos.y, mouseX, mouseY) < 100) this.vel.mult(-1);
                if(this.pos.x < 0 || this.pos.x > width) this.vel.x *= -1;
                if(this.pos.y < 0 || this.pos.y > height) this.vel.y *= -1;
            }
            show() { fill(255); ellipse(this.pos.x, this.pos.y, 5); }
        }
    </script>
</body>
</html>
